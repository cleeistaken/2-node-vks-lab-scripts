# VKS Lab Configuration File
# This file contains common parameters used by all VKS lab automation scripts

# Supervisor Environment
SUPERVISOR_IP="10.1.7.2"
SUPERVISOR_USERNAME="administrator@vsphere.local"
SUPERVISOR_PASSWORD="VMware123!VMware123!"

# Supervisor Namespace
SUPERVISOR_NAMESPACE_NAME="ns1"
SUPERVISOR_CONTEXT="ns1-ctx"

# VKS Cluster Configuration
CLUSTER_NAME="vks1"
CLUSTER_CONTEXT="vks1-ctx"
CLUSTER_NAMESPACE_NAME="vks1-ns"

# VKS Cluster Manifest Configuration
CLUSTER_CONTROL_PLANE_REPLICAS=1
CLUSTER_WORKER_REPLICAS=2
CLUSTER_KUBERNETES_VERSION="v1.35"
CLUSTER_VM_CLASS_CONTROL_PLANE="best-effort-medium"
CLUSTER_VM_CLASS_WORKER="best-effort-xlarge"
CLUSTER_STORAGE_CLASS="wcp-storage"
CLUSTER_SERVICES_CIDR="10.96.0.0/12"
CLUSTER_PODS_CIDR="192.168.0.0/16"
CLUSTER_SERVICE_DOMAIN="cluster.local"

# Storage Configuration
STORAGE_POLICY="wcp-storage"
STORAGE_SIZE="60Gi"
STORAGE_MOUNT_PATH="/var/lib/containerd"

# Timeouts and Retries
KUBECTL_TIMEOUT=300
CONTEXT_WAIT_TIMEOUT=60
CLUSTER_CREATION_TIMEOUT=900  # 15 minutes in seconds (900 seconds)
